  <title id="title">ブレーメン旧市街の基本ルート</title>
  <desc id="desc">北側のBremen Hbfから旧市街のMarktplatzへ南下し、南西のBöttcherstraße、南東のSchnoor、西のWeser川沿いにあるSchlachteを回る順序。Viertelは旧市街の東側にある翌日の候補。背景街並みはAI生成の編集イメージ。番号付き地点の相対位置はOpenStreetMapで確認。実線は基本ルート、破線は任意の分岐。縮尺と道路形状は正確ではありません。</desc>
