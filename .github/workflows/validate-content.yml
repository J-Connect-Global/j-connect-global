name: Validate content

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-content:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pinned runtime smoke dependencies
        run: npm ci

      - name: Build generated content
        run: node scripts/build-content.mjs

      - name: Apply canonical JA layout
        run: node scripts/apply-layout.mjs

      - name: Check generated files are committed
        run: git diff --exit-code

      - name: Validate Community workflows
        run: node scripts/validate-community.mjs

      - name: Validate Jobs data
        run: node scripts/validate-jobs.mjs

      - name: Validate Community and Jobs moderation
        run: node scripts/validate-submission-moderation.mjs

      - name: Test public data source and publication policy
        run: node scripts/test-public-data-pipeline.mjs

      - name: Test GAS submission persistence and idempotency
        run: node scripts/test-gas-submissions.mjs

      - name: Validate content registry and generated output
        run: node scripts/validate-content.mjs

      - name: Report editorial freshness
        run: node scripts/report-content-freshness.mjs --github-summary

      - name: Validate JA route and layout governance
        run: node scripts/validate-layout.mjs

      - name: Validate static site
        run: node scripts/validate-static-site.mjs

      - name: Validate production parity markers
        run: node scripts/validate-production-parity.mjs

      - name: Build and test production Pages artifact
        run: |
          node scripts/build-pages-artifact.mjs --site-dir _site
          node scripts/test-public-detail-generation.mjs --site-dir _site

      - name: Install Chromium for runtime smoke tests
        run: npx playwright install --with-deps chromium

      - name: Run browser runtime smoke tests
        run: npm run test:browser
