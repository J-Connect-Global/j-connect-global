  <title id="title">デュッセルドルフ家族外出の基本ルート</title>
  <desc id="desc">東側のNordpark/Aquazoo停留所からAquazooとNordparkを回り、西寄りの日本庭園を任意で加えて同じ停留所へ戻る位置関係。背景街並みはAI生成の編集イメージ。番号付き地点の相対位置はOpenStreetMapで確認。実線は基本ルート、破線は任意の分岐。縮尺と道路形状は正確ではありません。</desc>
