<svg xmlns="http://www.w3.org/2000/svg" width="480" height="720" viewBox="0 0 480 720" role="img" aria-labelledby="title desc">
  <title id="title">ベルリン中心部を東へ進む基本ルート（モバイル）</title>
  <desc id="desc">Berlin HbfからReichstag、Brandenburger Tor、Holocaust-Mahnmal、Unter den Linden、Museumsinselへ東進する順序。読み順を優先した縦配置で、実線は基本ルート、破線は任意の分岐。縮尺は正確ではありません。</desc>
  <defs>
    <marker id="route-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 10 5 0 10z" fill="#075b9a"/></marker>
    <marker id="optional-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 10 5 0 10z" fill="#147d75"/></marker>
    <filter id="card-shadow" x="-15%" y="-20%" width="130%" height="150%"><feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#12324a" flood-opacity="0.15"/></filter>
  </defs>
  <rect x="1" y="1" width="478" height="718" rx="18" fill="#f8fbfe" stroke="#a9c5dc" stroke-width="2"/>
  <text x="24" y="40" fill="#062f55" font-family="system-ui, -apple-system, sans-serif" font-size="23" font-weight="800">ベルリン中心部東進基本ルート</text>
  <g transform="translate(25 68)" aria-hidden="true">
    <line x1="0" y1="0" x2="34" y2="0" stroke="#075b9a" stroke-width="7" stroke-linecap="round"/>
    <text x="44" y="6" fill="#405e72" font-family="system-ui, -apple-system, sans-serif" font-size="16">基本</text>
    <line x1="128" y1="0" x2="162" y2="0" stroke="#147d75" stroke-width="5" stroke-dasharray="9 7" stroke-linecap="round"/>
    <text x="172" y="6" fill="#405e72" font-family="system-ui, -apple-system, sans-serif" font-size="16">任意</text>
  </g>
  <g aria-hidden="true">
    <path d="M240 174 L240 189.3" fill="none" stroke="#075b9a" stroke-width="7" stroke-linecap="round" marker-end="url(#route-arrow)"/>
    <path d="M240 257.3 L240 272.7" fill="none" stroke="#075b9a" stroke-width="7" stroke-linecap="round" marker-end="url(#route-arrow)"/>
    <path d="M240 340.7 L240 356" fill="none" stroke="#075b9a" stroke-width="7" stroke-linecap="round" marker-end="url(#route-arrow)"/>
    <path d="M240 424 L240 439.3" fill="none" stroke="#075b9a" stroke-width="7" stroke-linecap="round" marker-end="url(#route-arrow)"/>
    <path d="M240 507.3 L240 522.7" fill="none" stroke="#075b9a" stroke-width="7" stroke-linecap="round" marker-end="url(#route-arrow)"/>
    <path d="M240 590.7 L240 606" fill="none" stroke="#147d75" stroke-width="5" stroke-dasharray="12 10" stroke-linecap="round" marker-end="url(#optional-arrow)"/></g>
  <g filter="url(#card-shadow)">
    <rect x="36" y="106" width="408" height="68" rx="14" fill="#ffffff" stroke="#75a9d2" stroke-width="2"/>
    <circle cx="56" cy="140" r="9" fill="#075b9a"/>
    <text x="240" y="136" text-anchor="middle" fill="#092f4e" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="800"><tspan x="240" dy="0">Berlin Hbf</tspan></text>
    <text x="240" y="159" text-anchor="middle" fill="#4d6779" font-family="system-ui, -apple-system, sans-serif" font-size="16">到着</text>
  </g>
<g filter="url(#card-shadow)">
    <rect x="36" y="189.3" width="408" height="68" rx="14" fill="#ffffff" stroke="#75a9d2" stroke-width="2"/>
    <circle cx="56" cy="223.3" r="9" fill="#075b9a"/>
    <text x="240" y="219.3" text-anchor="middle" fill="#092f4e" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="800"><tspan x="240" dy="0">Reichstag</tspan></text>
    <text x="240" y="242.3" text-anchor="middle" fill="#4d6779" font-family="system-ui, -apple-system, sans-serif" font-size="16">予約時刻を固定</text>
  </g>
<g filter="url(#card-shadow)">
    <rect x="36" y="272.7" width="408" height="68" rx="14" fill="#ffffff" stroke="#75a9d2" stroke-width="2"/>
    <circle cx="56" cy="306.7" r="9" fill="#075b9a"/>
    <text x="240" y="302.7" text-anchor="middle" fill="#092f4e" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="800"><tspan x="240" dy="0">Brandenburger Tor</tspan></text>
    <text x="240" y="325.7" text-anchor="middle" fill="#4d6779" font-family="system-ui, -apple-system, sans-serif" font-size="16">東へ進む</text>
  </g>
<g filter="url(#card-shadow)">
    <rect x="36" y="356" width="408" height="68" rx="14" fill="#ffffff" stroke="#75a9d2" stroke-width="2"/>
    <circle cx="56" cy="390" r="9" fill="#075b9a"/>
    <text x="240" y="386" text-anchor="middle" fill="#092f4e" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="800"><tspan x="240" dy="0">Holocaust-Mahnmal</tspan></text>
    <text x="240" y="409" text-anchor="middle" fill="#4d6779" font-family="system-ui, -apple-system, sans-serif" font-size="16">南側</text>
  </g>
<g filter="url(#card-shadow)">
    <rect x="36" y="439.3" width="408" height="68" rx="14" fill="#ffffff" stroke="#75a9d2" stroke-width="2"/>
    <circle cx="56" cy="473.3" r="9" fill="#075b9a"/>
    <text x="240" y="469.3" text-anchor="middle" fill="#092f4e" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="800"><tspan x="240" dy="0">Unter den Linden</tspan></text>
    <text x="240" y="492.3" text-anchor="middle" fill="#4d6779" font-family="system-ui, -apple-system, sans-serif" font-size="16">大通り</text>
  </g>
<g filter="url(#card-shadow)">
    <rect x="36" y="522.7" width="408" height="68" rx="14" fill="#ffffff" stroke="#75a9d2" stroke-width="2"/>
    <circle cx="56" cy="556.7" r="9" fill="#075b9a"/>
    <text x="240" y="552.7" text-anchor="middle" fill="#092f4e" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="800"><tspan x="240" dy="0">Museumsinsel</tspan></text>
    <text x="240" y="575.7" text-anchor="middle" fill="#4d6779" font-family="system-ui, -apple-system, sans-serif" font-size="16">初日の終点</text>
  </g>
<g filter="url(#card-shadow)">
    <rect x="36" y="606" width="408" height="68" rx="14" fill="#edf9f6" stroke="#4c9f96" stroke-width="2"/>
    <circle cx="56" cy="640" r="9" fill="#147d75"/>
    <text x="240" y="636" text-anchor="middle" fill="#092f4e" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="800"><tspan x="240" dy="0">壁・地区散策</tspan></text>
    <text x="240" y="659" text-anchor="middle" fill="#4d6779" font-family="system-ui, -apple-system, sans-serif" font-size="16">2日目の選択</text>
  </g>
  <text x="456" y="695" text-anchor="end" fill="#526c7f" font-family="system-ui, -apple-system, sans-serif" font-size="16">概略図／縮尺は正確ではありません</text>
</svg>
