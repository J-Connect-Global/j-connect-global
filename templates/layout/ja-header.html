<header class="site-header">
  <div class="container header-inner">
    <a class="brand" href="/germany/ja/" aria-label="J-Connect Germany ホーム">
      <img class="brand-logo" src="/assets/images/brand/logo_header.png" alt="J-Connect Germany">
      <span class="brand-copy">
        <span class="brand-title">J-CONNECT GERMANY</span>
        <span class="brand-sub">ドイツと日本をつなぐ総合ポータル</span>
      </span>
    </a>
    <div class="header-actions">
      <nav class="header-nav" aria-label="主要ナビゲーション">
        <a href="/germany/ja/"{{active_home}}>ホーム</a>
        <a href="/germany/ja/about/"{{active_about}}>このサイトについて</a>
      </nav>
      <details class="header-category header-category-menu" aria-label="カテゴリ選択">
        <summary class="header-category-trigger" aria-haspopup="true">
          <span>カテゴリ</span>
          <span class="header-category-chevron" aria-hidden="true">▼</span>
        </summary>
        <div class="category-dropdown">
          <a href="/germany/ja/community/"{{active_community}}>交流・掲示板</a>
          <a href="/germany/ja/living/"{{active_living}}>生活・手続き</a>
          <a href="/germany/ja/jobs/"{{active_jobs}}>仕事・求人</a>
          <a href="/germany/ja/events/"{{active_events}}>ニュース・イベント</a>
          <a href="/germany/ja/learn-german/"{{active_learn_german}}>ドイツ語・学び</a>
        </div>
      </details>
      <form class="header-search" action="/germany/ja/search/" method="get" role="search">
        <label class="search-box" aria-label="サイト内検索">
          <span aria-hidden="true">⌕</span>
          <input type="search" name="q" placeholder="検索">
        </label>
        <button class="search-btn" type="submit" aria-label="検索"><span class="search-btn-icon" aria-hidden="true">⌕</span></button>
      </form>
      <details class="header-language header-language-menu" aria-label="言語切り替え">
        <summary class="header-language-trigger">
          <span>Language</span>
          <span class="header-language-current" lang="ja">日本語</span>
        </summary>
        <div class="language-dropdown">
          <a href="{{current_url}}" class="active" aria-current="page" lang="ja">日本語</a>
        </div>
      </details>
    </div>
  </div>
</header>
