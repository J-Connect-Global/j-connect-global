<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日本語サイト移転のお知らせ | J-Connect Germany</title>
  <meta name="description" content="J-Connect Germanyの日本語サイトは /germany/ja/ に移転しました。">
  <meta name="robots" content="noindex, follow">
  <link rel="canonical" href="https://j-connect-global.com/germany/ja/">
  <link rel="icon" type="image/png" href="/assets/images/brand/favicon.png">
  <link rel="stylesheet" href="/assets/css/site.css">
  <style>
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      margin: 0;
      background: #fdf8f2;
      color: #1a1014;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .transition {
      width: min(640px, calc(100% - 32px));
      padding: 32px;
      border: 1px solid #ede5e0;
      border-radius: 16px;
      background: #fffdf9;
      box-shadow: 0 10px 30px rgba(26, 16, 20, .08);
      text-align: center;
    }

    .transition h1 {
      margin: 0 0 12px;
      font-size: clamp(1.5rem, 3vw, 2rem);
    }

    .transition p {
      margin: 0 0 24px;
      color: #6b5e68;
      line-height: 1.8;
    }

    .transition a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 20px;
      border-radius: 999px;
      background: #e8002d;
      color: #fff;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main class="transition">
    <h1>日本語サイトは移転しました</h1>
    <p>J-Connect Germany の日本語サイトは、新しいURL構造に合わせて移動しました。</p>
    <a href="/germany/ja/">/germany/ja/ へ移動する</a>
  </main>
</body>
</html>
