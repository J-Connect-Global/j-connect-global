<header class="site-header">
  <div class="container header-inner">
    <a class="brand" href="/germany/ja/" aria-label="{{service_name}} ホーム">
      <img class="brand-logo" src="/assets/images/brand/logo_header.png" alt="{{service_logo_alt}}">
      <span class="brand-copy">
        <span class="brand-title">{{service_name_upper}}</span>
        <span class="brand-sub">{{tagline}}</span>
      </span>
    </a>
    <div class="header-actions">
      <nav class="header-nav" aria-label="主要ナビゲーション">
        <a href="/germany/ja/"{{active_home}}>ホーム</a>
        <a href="/germany/ja/about/"{{active_about}}>このサイトについて</a>
      </nav>
      <details class="header-category header-category-menu" aria-label="カテゴリ選択">
        <summary class="header-category-trigger" aria-haspopup="true">
          <span>カテゴリ</span>
          <span class="header-category-chevron" aria-hidden="true">▼</span>
        </summary>
        <div class="category-dropdown">
          <a href="/germany/ja/community/"{{active_community}}>交流・掲示板</a>
          <a href="/germany/ja/living/"{{active_living}}>生活・手続き</a>
          <a href="/germany/ja/jobs/"{{active_jobs}}>仕事・求人</a>
          <a href="/germany/ja/events/"{{active_events}}>ニュース・イベント</a>
          <a href="/germany/ja/learn-german/"{{active_learn_german}}>ドイツ語・学び</a>
        </div>
      </details>
      <form class="header-search" action="/germany/ja/search/" method="get" role="search">
        <label class="search-box" aria-label="サイト内検索">
          <span class="search-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <circle cx="11" cy="11" r="6.5"></circle>
              <path d="M16 16l4.5 4.5"></path>
            </svg>
          </span>
          <input type="search" name="q" placeholder="検索">
        </label>
        <button class="search-btn" type="submit" aria-label="検索">
          <span class="search-btn-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <circle cx="11" cy="11" r="6.5"></circle>
              <path d="M16 16l4.5 4.5"></path>
            </svg>
          </span>
        </button>
      </form>
      <button class="theme-toggle" type="button" data-theme-toggle aria-pressed="false" aria-label="ダークモードに切り替え">
        <span class="theme-toggle-track" aria-hidden="true">
          <span class="theme-toggle-icon theme-toggle-sun">
            <svg viewBox="0 0 24 24" focusable="false">
              <circle cx="12" cy="12" r="4"></circle>
              <path d="M12 2v2.2M12 19.8V22M4.2 4.2l1.6 1.6M18.2 18.2l1.6 1.6M2 12h2.2M19.8 12H22M4.2 19.8l1.6-1.6M18.2 5.8l1.6-1.6"></path>
            </svg>
          </span>
          <span class="theme-toggle-icon theme-toggle-moon">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M20.4 14.6A7.7 7.7 0 0 1 9.4 3.6 8.9 8.9 0 1 0 20.4 14.6Z"></path>
            </svg>
          </span>
        </span>
      </button>
    </div>
  </div>
</header>
