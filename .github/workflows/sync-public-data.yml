name: Sync public data

on:
  schedule:
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: sync-public-data-and-pages
  cancel-in-progress: false

jobs:
  sync-public-data:
    runs-on: ubuntu-latest
    outputs:
      changes_detected: ${{ steps.auto-commit-action.outputs.changes_detected }}
      commit_hash: ${{ steps.auto-commit-action.outputs.commit_hash }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sync all public data
        run: node scripts/sync-public-data.mjs

      - name: Commit updated public data
        id: auto-commit-action
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(data): sync public data"
          file_pattern: assets/data/community/*.json assets/data/jobs/*.json assets/data/eat/*.json assets/data/shopping/*.json assets/data/medical/*.json

  deploy-pages:
    if: needs.sync-public-data.outputs.changes_detected == 'true' || github.event_name == 'workflow_dispatch'
    needs: sync-public-data
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.sync-public-data.outputs.commit_hash || github.sha }}

      - name: Report Pages public-data artifact
        shell: bash
        env:
          EXPECTED_APPROVED_COMMUNITY_POST_ID: ${{ vars.EXPECTED_APPROVED_COMMUNITY_POST_ID || 'post_b316572b-01e1-4b77-b41a-c87e68d65f0b' }}
        run: |
          node --input-type=module <<'NODE'
          import { readFile } from "node:fs/promises";
          const payload = JSON.parse(await readFile("assets/data/community/posts.json", "utf8"));
          const ids = Array.isArray(payload.items) ? payload.items.map((item) => item.post_id || item.id) : [];
          if (payload.count !== ids.length) throw new Error(`Pages Community count mismatch: ${payload.count} != ${ids.length}`);
          if (!ids.length) throw new Error("Pages Community artifact unexpectedly contains zero posts.");
          const expectedId = process.env.EXPECTED_APPROVED_COMMUNITY_POST_ID;
          if (expectedId && !ids.includes(expectedId)) throw new Error(`Approved Community post is not present in the Pages artifact: ${expectedId}`);
          console.log(`Pages Community artifact count: ${ids.length}`);
          console.log(`Pages Community artifact post IDs: ${ids.join(", ")}`);
          for (const file of ["assets/data/jobs/jobs.json", "assets/data/eat/items.json", "assets/data/shopping/items.json", "assets/data/medical/items.json"]) {
            const data = JSON.parse(await readFile(file, "utf8"));
            if (data.count !== data.items.length) throw new Error(`${file} count mismatch: ${data.count} != ${data.items.length}`);
            console.log(`${file}: ${data.count} generated items`);
          }
          NODE

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build clean Pages artifact
        shell: bash
        run: |
          rm -rf _site
          mkdir -p _site

          for dir in assets germany de en ja; do
            if [ -d "$dir" ]; then
              mkdir -p "_site/$dir"
              cp -a "$dir/." "_site/$dir/"
            fi
          done

          for file in index.html 404.html robots.txt sitemap.xml CNAME favicon.ico site.webmanifest manifest.json browserconfig.xml; do
            if [ -f "$file" ]; then
              cp "$file" "_site/$file"
            fi
          done

          find . -maxdepth 1 -type f \( -name '*.webp' -o -name '*.png' -o -name '*.jpg' -o -name '*.jpeg' -o -name '*.svg' \) -exec cp {} _site/ \;
          find _site -depth -name '.*' -exec rm -rf {} +

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
