<svg xmlns="http://www.w3.org/2000/svg" width="820" height="520" viewBox="0 0 820 520" role="img" aria-labelledby="title desc">
  <title id="title">アムステルダム中心部の基本ルート</title>
  <desc id="desc">Amsterdam Centraalから運河地区、JordaanとDe 9 Straatjes、Museumpleinへ進みVondelparkを任意で加える順序。実線は基本ルート、破線は任意の分岐。縮尺は正確ではありません。</desc>
  <defs>
    <marker id="route-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 10 5 0 10z" fill="#075b9a"/></marker>
    <marker id="optional-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 10 5 0 10z" fill="#147d75"/></marker>
    <filter id="card-shadow" x="-15%" y="-20%" width="130%" height="150%"><feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#12324a" flood-opacity="0.15"/></filter>
  </defs>
  <rect x="1" y="1" width="818" height="518" rx="20" fill="#f8fbfe" stroke="#a9c5dc" stroke-width="2"/>
  <text x="34" y="44" fill="#062f55" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="800">アムステルダム中心部の基本ルート</text>
  <g transform="translate(34 72)" aria-hidden="true">
    <line x1="0" y1="0" x2="44" y2="0" stroke="#075b9a" stroke-width="7" stroke-linecap="round"/>
    <text x="56" y="6" fill="#405e72" font-family="system-ui, -apple-system, sans-serif" font-size="16">基本ルート</text>
    <line x1="178" y1="0" x2="222" y2="0" stroke="#147d75" stroke-width="5" stroke-dasharray="10 8" stroke-linecap="round"/>
    <text x="234" y="6" fill="#405e72" font-family="system-ui, -apple-system, sans-serif" font-size="16">任意の追加</text>
  </g>
  <g aria-hidden="true">
    <path d="M410 120 L420 225" fill="none" stroke="#075b9a" stroke-width="7" stroke-linecap="round" marker-end="url(#route-arrow)"/>
    <path d="M420 225 L245 280" fill="none" stroke="#075b9a" stroke-width="7" stroke-linecap="round" marker-end="url(#route-arrow)"/>
    <path d="M245 280 L405 335" fill="none" stroke="#075b9a" stroke-width="7" stroke-linecap="round" marker-end="url(#route-arrow)"/>
    <path d="M405 335 L555 415" fill="none" stroke="#075b9a" stroke-width="7" stroke-linecap="round" marker-end="url(#route-arrow)"/>
    <path d="M555 415 L710 330" fill="none" stroke="#147d75" stroke-width="5" stroke-dasharray="12 10" stroke-linecap="round" marker-end="url(#optional-arrow)"/></g>
  <g filter="url(#card-shadow)">
    <rect x="298" y="86" width="224" height="68" rx="14" fill="#ffffff" stroke="#75a9d2" stroke-width="2"/>
    <circle cx="318" cy="120" r="9" fill="#075b9a"/>
    <text x="410" y="116" text-anchor="middle" fill="#092f4e" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800"><tspan x="410" dy="0">Amsterdam Centraal</tspan></text>
    <text x="410" y="139" text-anchor="middle" fill="#4d6779" font-family="system-ui, -apple-system, sans-serif" font-size="15">到着地点</text>
  </g>
<g filter="url(#card-shadow)">
    <rect x="308" y="191" width="224" height="68" rx="14" fill="#ffffff" stroke="#75a9d2" stroke-width="2"/>
    <circle cx="328" cy="225" r="9" fill="#075b9a"/>
    <text x="420" y="221" text-anchor="middle" fill="#092f4e" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800"><tspan x="420" dy="0">Canal Belt</tspan></text>
    <text x="420" y="244" text-anchor="middle" fill="#4d6779" font-family="system-ui, -apple-system, sans-serif" font-size="15">運河を南へ</text>
  </g>
<g filter="url(#card-shadow)">
    <rect x="133" y="246" width="224" height="68" rx="14" fill="#ffffff" stroke="#75a9d2" stroke-width="2"/>
    <circle cx="153" cy="280" r="9" fill="#075b9a"/>
    <text x="245" y="276" text-anchor="middle" fill="#092f4e" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800"><tspan x="245" dy="0">Jordaan</tspan></text>
    <text x="245" y="299" text-anchor="middle" fill="#4d6779" font-family="system-ui, -apple-system, sans-serif" font-size="15">西側の街歩き</text>
  </g>
<g filter="url(#card-shadow)">
    <rect x="293" y="301" width="224" height="68" rx="14" fill="#ffffff" stroke="#75a9d2" stroke-width="2"/>
    <circle cx="313" cy="335" r="9" fill="#075b9a"/>
    <text x="405" y="331" text-anchor="middle" fill="#092f4e" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800"><tspan x="405" dy="0">De 9 Straatjes</tspan></text>
    <text x="405" y="354" text-anchor="middle" fill="#4d6779" font-family="system-ui, -apple-system, sans-serif" font-size="15">通り抜け</text>
  </g>
<g filter="url(#card-shadow)">
    <rect x="443" y="381" width="224" height="68" rx="14" fill="#ffffff" stroke="#75a9d2" stroke-width="2"/>
    <circle cx="463" cy="415" r="9" fill="#075b9a"/>
    <text x="555" y="411" text-anchor="middle" fill="#092f4e" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800"><tspan x="555" dy="0">Museumplein</tspan></text>
    <text x="555" y="434" text-anchor="middle" fill="#4d6779" font-family="system-ui, -apple-system, sans-serif" font-size="15">予約施設は一つ</text>
  </g>
<g filter="url(#card-shadow)">
    <rect x="598" y="296" width="224" height="68" rx="14" fill="#edf9f6" stroke="#4c9f96" stroke-width="2"/>
    <circle cx="618" cy="330" r="9" fill="#147d75"/>
    <text x="710" y="326" text-anchor="middle" fill="#092f4e" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800"><tspan x="710" dy="0">Vondelpark</tspan></text>
    <text x="710" y="349" text-anchor="middle" fill="#4d6779" font-family="system-ui, -apple-system, sans-serif" font-size="15">休憩の分岐</text>
  </g>
  <text x="786" y="493" text-anchor="end" fill="#526c7f" font-family="system-ui, -apple-system, sans-serif" font-size="15">概略図／縮尺は正確ではありません</text>
</svg>
