<svg xmlns="http://www.w3.org/2000/svg" width="820" height="520" viewBox="0 0 820 520" role="img" aria-labelledby="title desc">
  <title id="title">ロンドン48時間の基本ルート</title>
  <desc id="desc">到着空港または主要駅から宿、Westminster、South Bankへ進み2日目に一地区または一館を選ぶ順序。実線は基本ルート、破線は任意の分岐。縮尺は正確ではありません。</desc>
  <defs>
    <marker id="route-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 10 5 0 10z" fill="#075b9a"/></marker>
    <marker id="optional-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 10 5 0 10z" fill="#147d75"/></marker>
    <filter id="card-shadow" x="-15%" y="-20%" width="130%" height="150%"><feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#12324a" flood-opacity="0.15"/></filter>
  </defs>
  <rect x="1" y="1" width="818" height="518" rx="20" fill="#f8fbfe" stroke="#a9c5dc" stroke-width="2"/>
  <text x="34" y="44" fill="#062f55" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="800">ロンドン48時間の基本ルート</text>
  <g transform="translate(34 72)" aria-hidden="true">
    <line x1="0" y1="0" x2="44" y2="0" stroke="#075b9a" stroke-width="7" stroke-linecap="round"/>
    <text x="56" y="6" fill="#405e72" font-family="system-ui, -apple-system, sans-serif" font-size="16">基本ルート</text>
    <line x1="178" y1="0" x2="222" y2="0" stroke="#147d75" stroke-width="5" stroke-dasharray="10 8" stroke-linecap="round"/>
    <text x="234" y="6" fill="#405e72" font-family="system-ui, -apple-system, sans-serif" font-size="16">任意の追加</text>
  </g>
  <g aria-hidden="true">
    <path d="M110 145 L270 220" fill="none" stroke="#075b9a" stroke-width="7" stroke-linecap="round" marker-end="url(#route-arrow)"/>
    <path d="M270 220 L420 315" fill="none" stroke="#075b9a" stroke-width="7" stroke-linecap="round" marker-end="url(#route-arrow)"/>
    <path d="M420 315 L600 350" fill="none" stroke="#075b9a" stroke-width="7" stroke-linecap="round" marker-end="url(#route-arrow)"/>
    <path d="M600 350 L680 185" fill="none" stroke="#147d75" stroke-width="5" stroke-dasharray="12 10" stroke-linecap="round" marker-end="url(#optional-arrow)"/></g>
  <g filter="url(#card-shadow)">
    <rect x="-2" y="111" width="224" height="68" rx="14" fill="#ffffff" stroke="#75a9d2" stroke-width="2"/>
    <circle cx="18" cy="145" r="9" fill="#075b9a"/>
    <text x="110" y="141" text-anchor="middle" fill="#092f4e" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800"><tspan x="110" dy="0">到着空港 / 主要駅</tspan></text>
    <text x="110" y="164" text-anchor="middle" fill="#4d6779" font-family="system-ui, -apple-system, sans-serif" font-size="15">経路を一つ選ぶ</text>
  </g>
<g filter="url(#card-shadow)">
    <rect x="158" y="186" width="224" height="68" rx="14" fill="#ffffff" stroke="#75a9d2" stroke-width="2"/>
    <circle cx="178" cy="220" r="9" fill="#075b9a"/>
    <text x="270" y="216" text-anchor="middle" fill="#092f4e" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800"><tspan x="270" dy="0">宿</tspan></text>
    <text x="270" y="239" text-anchor="middle" fill="#4d6779" font-family="system-ui, -apple-system, sans-serif" font-size="15">荷物を置く</text>
  </g>
<g filter="url(#card-shadow)">
    <rect x="308" y="281" width="224" height="68" rx="14" fill="#ffffff" stroke="#75a9d2" stroke-width="2"/>
    <circle cx="328" cy="315" r="9" fill="#075b9a"/>
    <text x="420" y="311" text-anchor="middle" fill="#092f4e" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800"><tspan x="420" dy="0">Westminster</tspan></text>
    <text x="420" y="334" text-anchor="middle" fill="#4d6779" font-family="system-ui, -apple-system, sans-serif" font-size="15">初日の起点</text>
  </g>
<g filter="url(#card-shadow)">
    <rect x="488" y="316" width="224" height="68" rx="14" fill="#ffffff" stroke="#75a9d2" stroke-width="2"/>
    <circle cx="508" cy="350" r="9" fill="#075b9a"/>
    <text x="600" y="346" text-anchor="middle" fill="#092f4e" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800"><tspan x="600" dy="0">South Bank</tspan></text>
    <text x="600" y="369" text-anchor="middle" fill="#4d6779" font-family="system-ui, -apple-system, sans-serif" font-size="15">川を一度渡る</text>
  </g>
<g filter="url(#card-shadow)">
    <rect x="568" y="151" width="224" height="68" rx="14" fill="#edf9f6" stroke="#4c9f96" stroke-width="2"/>
    <circle cx="588" cy="185" r="9" fill="#147d75"/>
    <text x="680" y="181" text-anchor="middle" fill="#092f4e" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800"><tspan x="680" dy="0">一地区 / 一館</tspan></text>
    <text x="680" y="204" text-anchor="middle" fill="#4d6779" font-family="system-ui, -apple-system, sans-serif" font-size="15">2日目の選択</text>
  </g>
  <text x="786" y="493" text-anchor="end" fill="#526c7f" font-family="system-ui, -apple-system, sans-serif" font-size="15">概略図／縮尺は正確ではありません</text>
</svg>
