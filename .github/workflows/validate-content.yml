name: Validate content

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-content:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pinned runtime smoke dependencies
        run: npm ci

      - name: Fetch pull request base for metadata regression checks
        if: github.event_name == 'pull_request'
        run: git fetch --no-tags --depth=1 origin "${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"

      - name: Reject unapproved content metadata date regressions
        if: github.event_name == 'pull_request'
        run: node scripts/check-content-metadata-regression.mjs --base-ref "origin/${{ github.base_ref }}"

      - name: Build generated content and canonical layout
        run: npm run build

      - name: Check generated files are committed
        run: git diff --exit-code

      - name: Run deterministic validation contract
        run: npm run validate

      - name: Install Chromium for runtime smoke tests
        run: npx playwright install --with-deps chromium

      - name: Run browser runtime smoke tests
        run: npm run test:browser
