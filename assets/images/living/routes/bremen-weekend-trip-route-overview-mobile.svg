<svg xmlns="http://www.w3.org/2000/svg" width="480" height="740" viewBox="0 0 480 740" role="img" aria-labelledby="title desc">
  <title id="title">ブレーメン旧市街の基本ルート（モバイル）</title>
  <desc id="desc">北側のBremen Hbfから旧市街のMarktplatzへ南下し、南西のBöttcherstraße、南東のSchnoor、西のWeser川沿いにあるSchlachteを回る順序。Viertelは旧市街の東側にある翌日の候補。上部は北向きの位置関係、下部は番号順の地点一覧。背景街並みはAI生成の編集イメージで、地点はOpenStreetMapで確認しています。</desc>
