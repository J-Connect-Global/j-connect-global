<svg xmlns="http://www.w3.org/2000/svg" width="820" height="520" viewBox="0 0 820 520" role="img" aria-labelledby="title desc">
  <title id="title">ライン川沿いの区間選択</title>
  <desc id="desc">KölnからBonnとKönigswinter、Linz、Bacharach、St. Goarへ南下する候補区間と短縮点。実線は基本ルート、破線は任意の分岐。縮尺は正確ではありません。</desc>
  <defs>
    <marker id="route-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 10 5 0 10z" fill="#075b9a"/></marker>
    <marker id="optional-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 10 5 0 10z" fill="#147d75"/></marker>
    <filter id="card-shadow" x="-15%" y="-20%" width="130%" height="150%"><feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#12324a" flood-opacity="0.15"/></filter>
  </defs>
  <rect x="1" y="1" width="818" height="518" rx="20" fill="#f8fbfe" stroke="#a9c5dc" stroke-width="2"/>
  <text x="34" y="44" fill="#062f55" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="800">ライン川沿いの区間選択</text>
  <g transform="translate(34 72)" aria-hidden="true">
    <line x1="0" y1="0" x2="44" y2="0" stroke="#075b9a" stroke-width="7" stroke-linecap="round"/>
    <text x="56" y="6" fill="#405e72" font-family="system-ui, -apple-system, sans-serif" font-size="16">基本ルート</text>
    <line x1="178" y1="0" x2="222" y2="0" stroke="#147d75" stroke-width="5" stroke-dasharray="10 8" stroke-linecap="round"/>
    <text x="234" y="6" fill="#405e72" font-family="system-ui, -apple-system, sans-serif" font-size="16">任意の追加</text>
  </g>
  <g aria-hidden="true">
    <path d="M380 105 L430 205" fill="none" stroke="#075b9a" stroke-width="7" stroke-linecap="round" marker-end="url(#route-arrow)"/>
    <path d="M430 205 L365 305" fill="none" stroke="#075b9a" stroke-width="7" stroke-linecap="round" marker-end="url(#route-arrow)"/>
    <path d="M365 305 L430 405" fill="none" stroke="#075b9a" stroke-width="7" stroke-linecap="round" marker-end="url(#route-arrow)"/>
    <path d="M430 405 L610 430" fill="none" stroke="#075b9a" stroke-width="7" stroke-linecap="round" marker-end="url(#route-arrow)"/>
    <path d="M430 205 L650 250" fill="none" stroke="#147d75" stroke-width="5" stroke-dasharray="12 10" stroke-linecap="round" marker-end="url(#optional-arrow)"/>
    <path d="M650 250 L610 430" fill="none" stroke="#147d75" stroke-width="5" stroke-dasharray="12 10" stroke-linecap="round" marker-end="url(#optional-arrow)"/></g>
  <g filter="url(#card-shadow)">
    <rect x="268" y="71" width="224" height="68" rx="14" fill="#ffffff" stroke="#75a9d2" stroke-width="2"/>
    <circle cx="288" cy="105" r="9" fill="#075b9a"/>
    <text x="380" y="101" text-anchor="middle" fill="#092f4e" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800"><tspan x="380" dy="0">Köln</tspan></text>
    <text x="380" y="124" text-anchor="middle" fill="#4d6779" font-family="system-ui, -apple-system, sans-serif" font-size="15">北側の起点</text>
  </g>
<g filter="url(#card-shadow)">
    <rect x="318" y="171" width="224" height="68" rx="14" fill="#ffffff" stroke="#75a9d2" stroke-width="2"/>
    <circle cx="338" cy="205" r="9" fill="#075b9a"/>
    <text x="430" y="192" text-anchor="middle" fill="#092f4e" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800"><tspan x="430" dy="0">Bonn / Königswin</tspan><tspan x="430" dy="20">ter</tspan></text>
    <text x="430" y="230" text-anchor="middle" fill="#4d6779" font-family="system-ui, -apple-system, sans-serif" font-size="15">平地か山を選ぶ</text>
  </g>
<g filter="url(#card-shadow)">
    <rect x="253" y="271" width="224" height="68" rx="14" fill="#ffffff" stroke="#75a9d2" stroke-width="2"/>
    <circle cx="273" cy="305" r="9" fill="#075b9a"/>
    <text x="365" y="301" text-anchor="middle" fill="#092f4e" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800"><tspan x="365" dy="0">Linz</tspan></text>
    <text x="365" y="324" text-anchor="middle" fill="#4d6779" font-family="system-ui, -apple-system, sans-serif" font-size="15">対岸へ渡らない案</text>
  </g>
<g filter="url(#card-shadow)">
    <rect x="318" y="371" width="224" height="68" rx="14" fill="#ffffff" stroke="#75a9d2" stroke-width="2"/>
    <circle cx="338" cy="405" r="9" fill="#075b9a"/>
    <text x="430" y="401" text-anchor="middle" fill="#092f4e" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800"><tspan x="430" dy="0">Bacharach</tspan></text>
    <text x="430" y="424" text-anchor="middle" fill="#4d6779" font-family="system-ui, -apple-system, sans-serif" font-size="15">RB26を短縮点に</text>
  </g>
<g filter="url(#card-shadow)">
    <rect x="498" y="396" width="224" height="68" rx="14" fill="#ffffff" stroke="#75a9d2" stroke-width="2"/>
    <circle cx="518" cy="430" r="9" fill="#075b9a"/>
    <text x="610" y="426" text-anchor="middle" fill="#092f4e" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800"><tspan x="610" dy="0">St. Goar</tspan></text>
    <text x="610" y="449" text-anchor="middle" fill="#4d6779" font-family="system-ui, -apple-system, sans-serif" font-size="15">南側の候補</text>
  </g>
<g filter="url(#card-shadow)">
    <rect x="538" y="216" width="224" height="68" rx="14" fill="#edf9f6" stroke="#4c9f96" stroke-width="2"/>
    <circle cx="558" cy="250" r="9" fill="#147d75"/>
    <text x="650" y="246" text-anchor="middle" fill="#092f4e" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800"><tspan x="650" dy="0">船区間</tspan></text>
    <text x="650" y="269" text-anchor="middle" fill="#4d6779" font-family="system-ui, -apple-system, sans-serif" font-size="15">季節・水位で選択</text>
  </g>
  <text x="786" y="493" text-anchor="end" fill="#526c7f" font-family="system-ui, -apple-system, sans-serif" font-size="15">概略図／縮尺は正確ではありません</text>
</svg>
