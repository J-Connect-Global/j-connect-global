<svg xmlns="http://www.w3.org/2000/svg" width="820" height="520" viewBox="0 0 820 520" role="img" aria-labelledby="title desc">
  <title id="title">ベルリン中心部を東へ進む基本ルート</title>
  <desc id="desc">Berlin HbfからReichstag、Brandenburger Tor、Holocaust-Mahnmal、Unter den Linden、Museumsinselへ東進する順序。実線は基本ルート、破線は任意の分岐。縮尺は正確ではありません。</desc>
  <defs>
    <marker id="route-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 10 5 0 10z" fill="#075b9a"/></marker>
    <marker id="optional-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 10 5 0 10z" fill="#147d75"/></marker>
    <filter id="card-shadow" x="-15%" y="-20%" width="130%" height="150%"><feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#12324a" flood-opacity="0.15"/></filter>
  </defs>
  <rect x="1" y="1" width="818" height="518" rx="20" fill="#f8fbfe" stroke="#a9c5dc" stroke-width="2"/>
  <text x="34" y="44" fill="#062f55" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="800">ベルリン中心部を東へ進む基本ルート</text>
  <g transform="translate(34 72)" aria-hidden="true">
    <line x1="0" y1="0" x2="44" y2="0" stroke="#075b9a" stroke-width="7" stroke-linecap="round"/>
    <text x="56" y="6" fill="#405e72" font-family="system-ui, -apple-system, sans-serif" font-size="16">基本ルート</text>
    <line x1="178" y1="0" x2="222" y2="0" stroke="#147d75" stroke-width="5" stroke-dasharray="10 8" stroke-linecap="round"/>
    <text x="234" y="6" fill="#405e72" font-family="system-ui, -apple-system, sans-serif" font-size="16">任意の追加</text>
  </g>
  <g aria-hidden="true">
    <path d="M100 300 L225 210" fill="none" stroke="#075b9a" stroke-width="7" stroke-linecap="round" marker-end="url(#route-arrow)"/>
    <path d="M225 210 L365 250" fill="none" stroke="#075b9a" stroke-width="7" stroke-linecap="round" marker-end="url(#route-arrow)"/>
    <path d="M365 250 L430 365" fill="none" stroke="#075b9a" stroke-width="7" stroke-linecap="round" marker-end="url(#route-arrow)"/>
    <path d="M430 365 L550 245" fill="none" stroke="#075b9a" stroke-width="7" stroke-linecap="round" marker-end="url(#route-arrow)"/>
    <path d="M550 245 L700 190" fill="none" stroke="#075b9a" stroke-width="7" stroke-linecap="round" marker-end="url(#route-arrow)"/>
    <path d="M700 190 L665 395" fill="none" stroke="#147d75" stroke-width="5" stroke-dasharray="12 10" stroke-linecap="round" marker-end="url(#optional-arrow)"/></g>
  <g filter="url(#card-shadow)">
    <rect x="-12" y="266" width="224" height="68" rx="14" fill="#ffffff" stroke="#75a9d2" stroke-width="2"/>
    <circle cx="8" cy="300" r="9" fill="#075b9a"/>
    <text x="100" y="296" text-anchor="middle" fill="#092f4e" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800"><tspan x="100" dy="0">Berlin Hbf</tspan></text>
    <text x="100" y="319" text-anchor="middle" fill="#4d6779" font-family="system-ui, -apple-system, sans-serif" font-size="15">到着</text>
  </g>
<g filter="url(#card-shadow)">
    <rect x="113" y="176" width="224" height="68" rx="14" fill="#ffffff" stroke="#75a9d2" stroke-width="2"/>
    <circle cx="133" cy="210" r="9" fill="#075b9a"/>
    <text x="225" y="206" text-anchor="middle" fill="#092f4e" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800"><tspan x="225" dy="0">Reichstag</tspan></text>
    <text x="225" y="229" text-anchor="middle" fill="#4d6779" font-family="system-ui, -apple-system, sans-serif" font-size="15">予約時刻を固定</text>
  </g>
<g filter="url(#card-shadow)">
    <rect x="253" y="216" width="224" height="68" rx="14" fill="#ffffff" stroke="#75a9d2" stroke-width="2"/>
    <circle cx="273" cy="250" r="9" fill="#075b9a"/>
    <text x="365" y="246" text-anchor="middle" fill="#092f4e" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800"><tspan x="365" dy="0">Brandenburger Tor</tspan></text>
    <text x="365" y="269" text-anchor="middle" fill="#4d6779" font-family="system-ui, -apple-system, sans-serif" font-size="15">東へ進む</text>
  </g>
<g filter="url(#card-shadow)">
    <rect x="318" y="331" width="224" height="68" rx="14" fill="#ffffff" stroke="#75a9d2" stroke-width="2"/>
    <circle cx="338" cy="365" r="9" fill="#075b9a"/>
    <text x="430" y="361" text-anchor="middle" fill="#092f4e" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800"><tspan x="430" dy="0">Holocaust-Mahnmal</tspan></text>
    <text x="430" y="384" text-anchor="middle" fill="#4d6779" font-family="system-ui, -apple-system, sans-serif" font-size="15">南側</text>
  </g>
<g filter="url(#card-shadow)">
    <rect x="438" y="211" width="224" height="68" rx="14" fill="#ffffff" stroke="#75a9d2" stroke-width="2"/>
    <circle cx="458" cy="245" r="9" fill="#075b9a"/>
    <text x="550" y="241" text-anchor="middle" fill="#092f4e" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800"><tspan x="550" dy="0">Unter den Linden</tspan></text>
    <text x="550" y="264" text-anchor="middle" fill="#4d6779" font-family="system-ui, -apple-system, sans-serif" font-size="15">大通り</text>
  </g>
<g filter="url(#card-shadow)">
    <rect x="588" y="156" width="224" height="68" rx="14" fill="#ffffff" stroke="#75a9d2" stroke-width="2"/>
    <circle cx="608" cy="190" r="9" fill="#075b9a"/>
    <text x="700" y="186" text-anchor="middle" fill="#092f4e" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800"><tspan x="700" dy="0">Museumsinsel</tspan></text>
    <text x="700" y="209" text-anchor="middle" fill="#4d6779" font-family="system-ui, -apple-system, sans-serif" font-size="15">初日の終点</text>
  </g>
<g filter="url(#card-shadow)">
    <rect x="553" y="361" width="224" height="68" rx="14" fill="#edf9f6" stroke="#4c9f96" stroke-width="2"/>
    <circle cx="573" cy="395" r="9" fill="#147d75"/>
    <text x="665" y="391" text-anchor="middle" fill="#092f4e" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800"><tspan x="665" dy="0">壁・地区散策</tspan></text>
    <text x="665" y="414" text-anchor="middle" fill="#4d6779" font-family="system-ui, -apple-system, sans-serif" font-size="15">2日目の選択</text>
  </g>
  <text x="786" y="493" text-anchor="end" fill="#526c7f" font-family="system-ui, -apple-system, sans-serif" font-size="15">概略図／縮尺は正確ではありません</text>
</svg>
