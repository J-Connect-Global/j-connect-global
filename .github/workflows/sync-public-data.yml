name: Sync public data

on:
  schedule:
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"
  workflow_dispatch:

permissions: {}

concurrency:
  group: sync-public-data
  cancel-in-progress: false

jobs:
  sync-public-data:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      changes_detected: ${{ steps.auto-commit-action.outputs.changes_detected }}
      deployment_sha: ${{ steps.deployment-ref.outputs.commit_sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Sync all public data
        run: node scripts/sync-public-data.mjs

      - name: Commit updated public data
        id: auto-commit-action
        uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403 # v5
        with:
          commit_message: "chore(data): sync public data"
          file_pattern: assets/data/community/*.json assets/data/jobs/*.json assets/data/eat/*.json assets/data/shopping/*.json assets/data/medical/*.json

      - name: Resolve exact deployment commit
        id: deployment-ref
        shell: bash
        env:
          CHANGES_DETECTED: ${{ steps.auto-commit-action.outputs.changes_detected }}
          AUTO_COMMIT_SHA: ${{ steps.auto-commit-action.outputs.commit_hash }}
        run: |
          checked_out_sha="$(git rev-parse HEAD)"

          if [[ "$CHANGES_DETECTED" == "true" ]]; then
            if [[ ! "$AUTO_COMMIT_SHA" =~ ^[0-9a-f]{40}$ ]]; then
              echo "Public-data changes were committed without a valid commit_hash output." >&2
              exit 1
            fi
            if [[ "$checked_out_sha" != "$AUTO_COMMIT_SHA" ]]; then
              echo "Sync checkout is $checked_out_sha, but the generated-data commit is $AUTO_COMMIT_SHA." >&2
              exit 1
            fi
          fi

          git fetch --no-tags --depth=1 origin refs/heads/main
          current_main_sha="$(git rev-parse FETCH_HEAD)"
          if [[ "$checked_out_sha" != "$current_main_sha" ]]; then
            echo "Refusing to deploy sync result $checked_out_sha because current main is $current_main_sha." >&2
            exit 1
          fi

          echo "commit_sha=$checked_out_sha" >> "$GITHUB_OUTPUT"

  deploy-pages:
    if: github.ref == 'refs/heads/main' && (needs.sync-public-data.outputs.changes_detected == 'true' || github.event_name == 'workflow_dispatch')
    needs: sync-public-data
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/pages-build-deploy.yml
    with:
      commit_sha: ${{ needs.sync-public-data.outputs.deployment_sha }}
